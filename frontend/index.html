<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chronicle Worlds</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0a0a0f;
        color: #c8c8d4;
        font-family: 'Courier New', monospace;
        display: grid;
        grid-template-columns: 1fr 320px;
        grid-template-rows: auto 1fr auto;
        height: 100dvh;
        overflow: hidden;
      }

      header {
        grid-column: 1 / -1;
        padding: 12px 20px;
        border-bottom: 1px solid #2a2a3a;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      header h1 { font-size: 1rem; color: #8888cc; letter-spacing: 2px; }
      #status { font-size: 0.75rem; color: #555; margin-left: auto; }
      #cooldown-display { font-size: 0.75rem; color: #44aa66; min-width: 80px; text-align: right; }

      #mobile-panel-toggle {
        display: none;
        background: #1a1a3a;
        border: 1px solid #3a3a6a;
        color: #8888cc;
        padding: 5px 12px;
        font-family: inherit;
        font-size: 0.75rem;
        cursor: pointer;
        letter-spacing: 1px;
        margin-left: auto;
      }

      #auth-panel {
        grid-column: 1 / -1;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 12px; padding: 40px 20px;
      }
      #auth-panel input {
        background: #111; border: 1px solid #333; color: #c8c8d4;
        padding: 8px 12px; font-family: inherit; width: 260px; max-width: 100%;
      }
      #auth-panel button {
        background: #2a2a6a; border: 1px solid #4444aa; color: #aaaaee;
        padding: 8px 24px; cursor: pointer; font-family: inherit;
        letter-spacing: 1px; width: 260px; max-width: 100%;
      }
      #auth-panel button:hover { background: #3a3a8a; }
      #auth-error { color: #cc4444; font-size: 0.8rem; }

      #game-area { display: none; grid-column: 1; overflow: hidden; }
      canvas#grid-canvas { display: block; width: 100%; height: 100%; background: #0d0d14; }

      #sidebar {
        display: none;
        border-left: 1px solid #2a2a3a;
        overflow-y: auto; padding: 12px;
        flex-direction: column; gap: 12px;
      }
      #sidebar h2 { font-size: 0.75rem; color: #666; letter-spacing: 1px; margin-bottom: 4px; }
      #action-panel { display: flex; flex-direction: column; gap: 6px; }
      .action-btn {
        background: #111; border: 1px solid #333; color: #aaa;
        padding: 8px 10px; cursor: pointer; font-family: inherit;
        font-size: 0.8rem; text-align: left; transition: border-color 0.15s;
      }
      .action-btn:hover:not(:disabled) { border-color: #6666cc; color: #ccccff; }
      .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      /* ── Character position panel ── */
      #char-position-panel {
        font-size: 0.72rem;
        color: #556655;
        line-height: 1.8;
        border: 1px solid #1a2a1a;
        padding: 8px 10px;
        background: #080e08;
      }
      #char-position-panel .pos-label { color: #446644; }
      #char-position-panel .pos-value { color: #88cc88; }
      #char-position-panel .setting-name { color: #669966; font-style: italic; }
      #char-setting-desc {
        color: #3d5c3d;
        font-size: 0.68rem;
        font-style: italic;
        line-height: 1.5;
        margin-top: 2px;
        min-height: 1em;
      }

      #chronicle-list {
        font-size: 0.72rem; line-height: 1.6; color: #666;
        display: flex; flex-direction: column; gap: 4px;
      }
      .chronicle-entry { border-left: 2px solid #2a2a3a; padding-left: 8px; }
      .chronicle-entry.branch-1 { border-color: #6644aa; }
      .chronicle-entry.branch-2 { border-color: #aa4466; }
      .chronicle-entry.branch-3 { border-color: #44aa88; }

      footer {
        grid-column: 1 / -1;
        padding: 6px 20px;
        border-top: 1px solid #1a1a2a;
        font-size: 0.7rem; color: #333;
        display: flex; gap: 16px; flex-wrap: wrap;
      }
      #world-time { color: #446644; }

      /* ── Direction Picker Modal ── */
      #travel-modal {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        align-items: center; justify-content: center;
        z-index: 200;
      }
      #travel-modal.open { display: flex; }
      #travel-modal-inner {
        background: #111; border: 1px solid #4444aa;
        padding: 20px; display: flex; flex-direction: column; gap: 12px;
        min-width: 220px;
      }
      #travel-modal-inner h3 {
        font-size: 0.8rem; color: #8888cc; letter-spacing: 1px; text-align: center;
      }
      #travel-error {
        font-size: 0.72rem; color: #cc4444; min-height: 1em; text-align: center;
      }
      .dir-grid {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      }
      .dir-btn {
        background: #1a1a2a; border: 1px solid #333; color: #aaa;
        padding: 8px 4px; cursor: pointer; font-family: inherit;
        font-size: 0.8rem; text-align: center; transition: border-color 0.15s;
      }
      .dir-btn:hover:not(:disabled) { border-color: #6666cc; color: #ccccff; }
      .dir-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .dir-btn.empty { border-color: transparent; background: transparent; cursor: default; }
      .dir-btn.no-cell { opacity: 0.25; cursor: not-allowed; border-color: #1a1a1a; }
      #travel-cancel {
        background: transparent; border: 1px solid #333; color: #555;
        padding: 6px; cursor: pointer; font-family: inherit;
        font-size: 0.75rem; text-align: center;
      }
      #travel-cancel:hover { border-color: #666; color: #aaa; }

      /* ── Target Picker Modal ── */
      #target-modal {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        align-items: center; justify-content: center;
        z-index: 200;
      }
      #target-modal.open { display: flex; }
      #target-modal-inner {
        background: #111; border: 1px solid #4444aa;
        padding: 20px; display: flex; flex-direction: column; gap: 12px;
        min-width: 260px; max-width: 340px; width: 90vw;
      }
      #target-modal-inner h3 {
        font-size: 0.8rem; color: #8888cc; letter-spacing: 1px; text-align: center;
      }
      #target-modal-subtitle {
        font-size: 0.7rem; color: #555; text-align: center; margin-top: -6px;
      }
      #target-error {
        font-size: 0.72rem; color: #cc4444; min-height: 1em; text-align: center;
      }
      #target-list {
        display: flex; flex-direction: column; gap: 6px;
        max-height: 220px; overflow-y: auto;
      }
      .target-btn {
        background: #1a1a2a; border: 1px solid #333; color: #aaa;
        padding: 9px 10px; cursor: pointer; font-family: inherit;
        font-size: 0.78rem; text-align: left; transition: border-color 0.15s;
        display: flex; justify-content: space-between; align-items: center;
      }
      .target-btn:hover:not(:disabled) { border-color: #6666cc; color: #ccccff; }
      .target-btn .char-stats { font-size: 0.68rem; color: #445; }
      .target-btn:hover:not(:disabled) .char-stats { color: #778; }
      #target-empty {
        font-size: 0.75rem; color: #444; text-align: center; padding: 12px 0;
      }
      #target-amount-row {
        display: none;
        align-items: center; gap: 8px; font-size: 0.75rem; color: #666;
      }
      #target-amount-row.visible { display: flex; }
      #target-amount-row label { white-space: nowrap; }
      #target-amount {
        background: #0a0a0f; border: 1px solid #333; color: #aaa;
        padding: 4px 8px; font-family: inherit; font-size: 0.75rem;
        width: 60px; text-align: center;
      }
      #target-cancel {
        background: transparent; border: 1px solid #333; color: #555;
        padding: 6px; cursor: pointer; font-family: inherit;
        font-size: 0.75rem; text-align: center;
      }
      #target-cancel:hover { border-color: #666; color: #aaa; }

      @media (max-width: 767px) {
        body { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; }
        #mobile-panel-toggle { display: inline-block; margin-left: auto; }
        #cooldown-display { margin-left: 0; }
        #status { margin-left: 0; }
        #game-area { grid-column: 1; }
        #sidebar {
          position: fixed; bottom: 0; left: 0; right: 0; height: 55vh;
          border-left: none; border-top: 1px solid #3a3a6a;
          background: rgba(10, 10, 20, 0.97); z-index: 100;
          transform: translateY(100%); transition: transform 0.25s ease;
          overflow-y: auto; padding: 16px;
        }
        #sidebar.open { transform: translateY(0); }
        #sidebar::before {
          content: ''; display: block; width: 40px; height: 3px;
          background: #3a3a6a; border-radius: 2px; margin: 0 auto 12px;
        }
        #action-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-btn { padding: 12px 8px; font-size: 0.75rem; text-align: center; }
        footer { padding: 6px 12px; gap: 10px; font-size: 0.65rem; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>CHRONICLE WORLDS</h1>
      <span id="status">not connected</span>
      <span id="cooldown-display"></span>
      <button id="mobile-panel-toggle">ACTIONS &#9650;</button>
    </header>

    <div id="auth-panel">
      <h2 style="color:#8888cc;letter-spacing:2px">ENTER THE WORLD</h2>
      <input type="email" id="auth-email" placeholder="email" autocomplete="email" />
      <input type="password" id="auth-password" placeholder="password" autocomplete="current-password" />
      <button id="auth-sign-in">Sign In</button>
      <button id="auth-sign-up" style="background:#111;border-color:#333;color:#666">Create Account</button>
      <span id="auth-error"></span>
    </div>

    <div id="game-area">
      <canvas id="grid-canvas"></canvas>
    </div>

    <div id="sidebar">
      <!-- Character position panel -->
      <div id="char-position-panel">
        <div><span class="pos-label">pos: </span><span class="pos-value" id="char-pos-xyz">—</span></div>
        <div><span class="pos-label">setting: </span><span class="setting-name" id="char-setting-name">—</span></div>
        <div id="char-setting-desc"></div>
      </div>

      <div>
        <h2>ACTIONS</h2>
        <div id="action-panel">
          <button class="action-btn" data-action="exchange_information">Exchange Information <span style="color:#444">[10u]</span></button>
          <button class="action-btn" data-action="resolve_conflict">Resolve Conflict <span style="color:#444">[7u]</span></button>
          <button class="action-btn" data-action="introduce_conflict">Introduce Conflict <span style="color:#444">[5u]</span></button>
          <button class="action-btn" data-action="exchange_material">Exchange Material <span style="color:#444">[3u]</span></button>
          <button class="action-btn" data-action="travel">Travel <span style="color:#444">[calc]</span></button>
        </div>
      </div>
      <div>
        <h2>CHRONICLE</h2>
        <div id="chronicle-list"><span style="color:#333">loading...</span></div>
      </div>
    </div>

    <!-- Direction Picker Modal -->
    <div id="travel-modal">
      <div id="travel-modal-inner">
        <h3>CHOOSE DIRECTION</h3>
        <p id="travel-error"></p>
        <div class="dir-grid">
          <button class="dir-btn empty" disabled></button>
          <button class="dir-btn" data-dir="north">N</button>
          <button class="dir-btn" data-dir="up">&#x25B2; Up</button>
          <button class="dir-btn" data-dir="west">W</button>
          <button class="dir-btn empty" disabled>&#x25CF;</button>
          <button class="dir-btn" data-dir="east">E</button>
          <button class="dir-btn" data-dir="down">&#x25BC; Dn</button>
          <button class="dir-btn" data-dir="south">S</button>
          <button class="dir-btn empty" disabled></button>
        </div>
        <button id="travel-cancel">cancel</button>
      </div>
    </div>

    <!-- Target Picker Modal -->
    <div id="target-modal">
      <div id="target-modal-inner">
        <h3 id="target-modal-title">CHOOSE TARGET</h3>
        <p id="target-modal-subtitle"></p>
        <p id="target-error"></p>
        <div id="target-amount-row">
          <label for="target-amount">amount:</label>
          <input type="number" id="target-amount" min="1" max="99" value="1" />
        </div>
        <div id="target-list"></div>
        <p id="target-empty" style="display:none">no other characters in this cell</p>
        <button id="target-cancel">cancel</button>
      </div>
    </div>

    <footer>
      <span id="player-info">—</span>
      <span id="turn-info">—</span>
      <span id="branch-info">branch: root</span>
      <span id="world-time">tu: — · du: —</span>
    </footer>

    <script type="module" src="/src/app.js"></script>

    <script>
      const toggle  = document.getElementById('mobile-panel-toggle')
      const sidebar = document.getElementById('sidebar')
      toggle.addEventListener('click', () => {
        const isOpen = sidebar.classList.toggle('open')
        toggle.innerHTML = isOpen ? 'ACTIONS &#9660;' : 'ACTIONS &#9650;'
      })
    </script>
  </body>
</html>
